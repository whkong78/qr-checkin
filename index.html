<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂點名系統 - GPS 版</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1e3c72; margin-top: 0; }
        h3 { color: #555; background: #e8f0fe; padding: 10px; border-radius: 8px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .btn-checkin { 
            width: 100%; padding: 15px; margin-top: 20px; 
            background-color: #2ecc71; color: white; border: none; 
            border-radius: 10px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-checkin:active { transform: scale(0.98); background-color: #27ae60; }
        .btn-checkin:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; line-height: 1.5; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 課堂簽到</h2>
    <h3 id="room-name">載入中...</h3>
    
    <input type="text" id="studentId" placeholder="請輸入學號">
    <input type="text" id="studentName" placeholder="請輸入姓名">
    
    <button id="checkin-btn" class="btn-checkin" onclick="startCheckIn()">點擊簽到</button>
    
    <div id="status"></div>
</div>

<script>
    // --- 1. 配置區 ---
    const ROOMS = {
        "1": { name: "個經二", lat: 24.74609, lng: 121.74567 },
        "2": { name: "產業經濟", lat: 24.74622, lng: 121.74715 },
        "3": { name: "休閒經濟", lat: 24.74609, lng: 121.74567 },
        "4": { name: "績效評估", lat: 24.74609, lng: 121.74567 }
    };

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo0pa9VoyjEV-HGvQbluoLZEGUMl97TulTm3pkMn02h-ZmqnfT2euT2WiAxIjV0KmR8A/exec"; 
    const MAX_DISTANCE = 100; // 允許範圍 (公尺)

    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || "1";
    const currentRoom = ROOMS[roomId] || ROOMS["1"];
    document.getElementById('room-name').innerText = "當前教室：" + currentRoom.name;

    // --- 2. 距離計算 ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- 3. 簽到主邏輯 ---
    function startCheckIn() {
        const sid = document.getElementById('studentId').value.trim();
        const sname = document.getElementById('studentName').value.trim();
        const btn = document.getElementById('checkin-btn');

        if (!sid || !sname) {
            alert("請填寫學號和姓名！");
            return;
        }

        // 防代簽檢查 (一機一簽)
        const today = new Date().toDateString();
        if (localStorage.getItem('checked_in_' + roomId) === today) {
            showStatus("❌ 這台設備今日已簽到過，無法重複簽到他人學號。", "error");
            return;
        }

        btn.disabled = true;
        showStatus("正在取得 GPS 定位...", "");

        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = getDistance(currentRoom.lat, currentRoom.lng, pos.coords.latitude, pos.coords.longitude);
            
            if (dist <= MAX_DISTANCE) {
                uploadData(sid, sname, Math.round(dist), today);
            } else {
                showStatus(`❌ 距離太遠！您目前在 ${currentRoom.name} 範圍外 (距離約 ${Math.round(dist)}m)`, "error");
                btn.disabled = false;
            }
        }, (err) => {
            showStatus("❌ 錯誤：無法取得定位權限。請開啟瀏覽器的 GPS 權限。", "error");
            btn.disabled = false;
        }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function uploadData(id, name, dist, todayKey) {
        showStatus("正在上傳簽到資料...", "");
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                studentId: id, 
                studentName: name, 
                qrData: "GPS 簽到 (" + currentRoom.name + ")", 
                distance: dist 
            })
        }).then(() => {
            localStorage.setItem('checked_in_' + roomId, todayKey);
            showStatus(`✅ ${name} 簽到成功！<br>教室：${currentRoom.name}<br>設備已鎖定。`, "success");
            document.getElementById('checkin-btn').style.display = 'none';
        }).catch(err => {
            showStatus("❌ 上傳失敗，請檢查網路連線。", "error");
            document.getElementById('checkin-btn').disabled = false;
        });
    }

    function showStatus(msg, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.innerHTML = msg;
        statusDiv.className = type;
    }
</script>

</body>
</html>
